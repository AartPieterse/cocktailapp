name: CI

# Guard the release path AND publish it.
#
# Netlify's own builds are STOPPED for this project: it auto-installs the
# @netlify/angular-runtime plugin (framework detection), which cannot build this
# npm-workspaces monorepo from the repo root. So GitHub Actions is the sole path to
# production — it builds the static SPA here and pushes the finished files to Netlify.
#
#   PR into main / push to development -> build + verify (gate)
#   push to main (merged PR)           -> build + verify, then deploy to Netlify
on:
  pull_request:
    branches: [main]
  push:
    branches: [development, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared types
        run: npm run build:shared

      - name: Shared unit tests
        run: npm test --workspace @cocktailapp/shared

      - name: Regenerate catalog and verify both bundles are committed
        run: |
          npm run build:catalog
          # Stage first so the check also catches an UNTRACKED bundle (a forgotten `git add`),
          # not just modifications to already-tracked files (`git diff` alone ignores untracked).
          git add -A -- frontend/public/catalog.json app/assets/catalog.json
          git diff --cached --exit-code -- frontend/public/catalog.json app/assets/catalog.json \
            || { echo "::error::catalog bundles are out of date or uncommitted — run 'npm run build:catalog' and commit both frontend/public/catalog.json and app/assets/catalog.json."; exit 1; }

      - name: Build frontend (production)
        run: npm run build --workspace frontend

      - name: Build backend
        run: npm run build --workspace backend

      - name: Backend unit tests
        run: npm test --workspace backend

  deploy:
    # Publish the static SPA to Netlify. Only after a green build on main (a merged PR).
    #
    # Requires one repository secret:
    #   NETLIFY_AUTH_TOKEN — Netlify → User settings → Applications → New access token
    # NETLIFY_SITE_ID below is the site's API ID, not a secret (it appears in every deploy
    # URL); move it to a secret if you prefer. The Netlify CLI reads both from the env.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: netlify-production
      cancel-in-progress: false
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: abff2bf1-356b-4be6-ab90-d314080ee2e3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared types
        run: npm run build:shared

      - name: Generate static catalog
        run: npm run build:catalog

      - name: Build frontend (production)
        run: npm run build --workspace frontend

      - name: Deploy to Netlify (production)
        # Deploy the already-built SPA from a directory OUTSIDE the repo checkout. Two reasons:
        #   1. Running the Netlify CLI inside the npm-workspaces tree makes it abort with
        #      "multiple projects detected" — running from a plain dir avoids that entirely.
        #   2. There is no netlify.toml / package.json above this dir, so the CLI can't resolve
        #      a build command or plugins — it does a pure static upload (no build, no plugin).
        # (The site's server-side @netlify/angular-runtime plugin registration was also removed
        # via the API; this keeps the deploy plugin-free regardless.) SPA routing ships via the
        # committed frontend/public/_redirects, which is inside the copied bundle.
        run: |
          publish="$RUNNER_TEMP/netlify-publish"
          rm -rf "$publish"; mkdir -p "$publish"
          cp -a "$GITHUB_WORKSPACE/frontend/dist/frontend/browser/." "$publish/"
          cd "$publish"
          npx --yes netlify-cli deploy --prod --dir=. --site="$NETLIFY_SITE_ID" --message="CI deploy ${GITHUB_SHA::7} (${GITHUB_REF_NAME})"
